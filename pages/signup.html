<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&lt;/&gt;CamCourses | sign up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kantumruy Pro', sans-serif; }
        .code-font { font-family: 'Fira Code', monospace; }
        .input-focus:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body class="bg-white text-gray-800 min-h-screen">

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12 px-8 py-16 items-center">
        
        <div class="space-y-8 items-start ">
           

            <div class="space-y-4">
                <h1 class="text-5xl font-bold">
                    <span class="text-blue-600">រៀនកូដ</span> 
                    <span class="text-orange-500">Online|</span>
                </h1>
                <p class="text-xl text-gray-600">នរណាក៏អាចរៀនកូដបានដែរ |</p>
                <div class="flex items-center space-x-2 text-blue-600 bg-blue-50 w-fit px-4 py-2 rounded-full text-sm">
                    <span class="font-bold">🌐</span>
                    <p>កូដនៅលើគេហទំព័រ ដោយមិនចាំបាច់តំឡើងកម្មវិធីបន្ថែម |</p>
                </div>
                <div class="flex items-center space-x-2 pt-4">
                   
                       
                    <p class="text-sm font-medium text-green-700 ">អ្នកប្រើប្រាស់សរុប = <span class="text-purple-600">29858 </span></p><p><span>|</span></p>
                </div>
            </div>
        </div>

        <div class="bg-blue-50/30 p-10 rounded-2xl border border-gray-100 shadow-sm max-w-md mx-auto w-full">
            <h2 class="text-2xl font-bold text-center text-blue-600 mb-8">Sign Up with CamCourses</h2>
            
            <form class="space-y-6">
                <div class="space-y-2 relative">
                    <label class="code-font text-sm text-orange-500">let <span class="text-gray-700">Email</span> =</label>

                    <input type="email" class="w-full p-3 border border-gray-200 rounded-lg input-focus bg-white" placeholder="">
                </div>

                <div class="space-y-2 relative">
                    <label class="code-font text-sm text-orange-500">let <span class="text-gray-700">password</span> =</label>
                    <input type="password" class="w-full p-3 border border-gray-200 rounded-lg input-focus bg-white">
                    <button type="button" class="absolute right-3 bottom-3 text-gray-400 hover:text-gray-600">
                        
                    </button>
                </div>
                    <div class="space-y-2 relative">
                    <label class="code-font text-sm text-orange-500">let <span class="text-gray-700">confirmPassword</span> =</label>
                    <input type="password" class="w-full p-3 border border-gray-200 rounded-lg input-focus bg-white">
                    <button type="button" class="absolute right-3 bottom-3 text-gray-400 hover:text-gray-600">
                        
                    </button>
                </div>
                <div class="text-orange-500 flex items-center justify-center h-1">សូមចុចគ្រីសលើប្រអប់</div>

                <div class="bg-gray-50 border border-gray-200 p-4 rounded-lg flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <input type="checkbox" class="w-12 h-6 rounded border-gray-300">
                        <span class="text-sm text-gray-600 ">I'm not a robot</span>
                    </div>
                    <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" class="w-8 opacity-70" alt="reCAPTCHA">
                </div>

                <button class="w-full bg-blue-400 text-white font-bold py-3 rounded-lg hover:bg-blue-500 transition shadow-md">
                    Next >
                </button>
            </form>

            <div class="mt-8 text-center space-y-4">
                <p class="text-orange-600">មានគណនីហើយ? <a href="#" class="text-blue-600 font-bold">Login</a></p>
                <p class="text-xs text-gray-400 px-8">By signing up, you agree to our <a href="#" class="underline text-blue-600">Privacy Policy</a></p>
            </div>
        </div>

    </main>

</body>
</html>
